pipeline:
  name: 22-file-trigger-change
  timeout: 15s
  tracks:
    # Track A: create the file, wait, then overwrite it (triggers 'change' event)
    - id: writer
      name: Write and then overwrite the trigger file
      tasks:
        - id: create
          name: Create initial file
          command: bun ../../helpers/write-file.ts .tagma-tests/generated/watched.txt INITIAL

        - id: overwrite
          name: Overwrite with new content after delay
          command: bun ../../helpers/sleep-then-write.ts 800 .tagma-tests/generated/watched.txt CHANGED
          depends_on: [create]

    # Track B: trigger watches the file — fires when file event detected.
    # depends_on writer.create ensures the file already exists, so the watcher
    # may resolve via either the ready-event existence check or the change event
    # from the subsequent overwrite. Both are valid — the pipeline exercises
    # the file trigger lifecycle either way.
    - id: reactor
      name: React to file change
      tasks:
        - id: wait_change
          name: File trigger fires on file event
          trigger:
            type: file
            path: .tagma-tests/generated/watched.txt
            timeout: 12s
          depends_on: [writer.create]
          command: bun ../../helpers/write-file.ts .tagma-tests/generated/reacted.txt CHANGE_DETECTED
          completion:
            type: file_exists
            path: .tagma-tests/generated/reacted.txt
            kind: file
